<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Task-In-Progress</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/images/post-it-64.png" type="image/png">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script type="module" src="assets/js/register.js"></script>
</head>
<body class="login-page">
    <div class="login-container wide">
        <div class="login-card">
            <header class="login-header">
                <img src="assets/images/post-it-64.png" alt="Task-In-Progress Logo">
                <h1 class="app-title-login">Task-In-Progress</h1>
                <p class="login-subtitle">Crea tu cuenta para empezar a organizar tus proyectos</p>
            </header>

            <form class="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="fullname">Nombre completo</label>
                    <input type="text" id="fullname" placeholder="Joe McMillan" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">Teléfono móvil</label>
                    <input type="tel" id="phone" placeholder="+54 11 1234 5678" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" 
                           id="password" 
                           placeholder="••••••••" 
                           required 
                           min="8" 
                           max="16"
                    >
                </div>

                <div class="form-group">
                    <label for="repeat-password">Repetir contraseña</label>
                    <input type="password" 
                           id="repeat-password" 
                           placeholder="••••••••" 
                           required 
                           min="8" 
                           max="16"
                    >
                </div>

                <button type="submit" class="login-btn">Registrarme</button>
            </form>

            <footer class="login-footer">
                <p>¿Ya tienes una cuenta? <a href="login.html" class="register-link">Inicia sesión aquí</a></p>
            </footer>
        </div>
    </div>

</body>
</html>
