<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Task-In-Progress</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/images/post-it-64.png" type="image/png">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-card ">
            <header class="login-header">
                <img src="assets/images/post-it-64.png" alt="Task-In-Progress Logo">
                <h1 class="app-title-login">Task-In-Progress</h1>
                <p class="login-subtitle">Inicia sesión para gestionar tus proyectos</p>
            </header>

            <form class="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn">Ingresar</button>
            </form>

            <footer class="login-footer">
                <p>¿No tienes una cuenta? <a href="register.html" 
                                             class="register-link">Regístrate aquí
                                          </a>
                </p>
                <br>
                <p>¿Olvidaste la contraseña? <a href="recover.html" 
                                             class="register-link">Recupérala aquí
                                          </a>
                </p>
            </footer>
        </div>
    </div>

</body>
</html>
